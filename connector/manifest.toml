# Aileron connector manifest for github://ALRubinger/aileron-connector-athena.
#
# Per ADR-0002 the manifest declares the connector's identity, what it
# can talk to (network), and what credentials it needs to do so. The
# runtime enforces these at the WASM sandbox boundary and at the action
# boundary (defense in depth per ADR-0003 / ADR-0005).

# `version` is `0.0.0-dev` in source as a placeholder. The release
# pipeline substitutes the real version before hashing/signing/packing.
# The concrete, verified mechanism: this repo's release.yml pins
# ALRubinger/aileron-actions/actions/build-wasm-connector by commit SHA,
# and that composite action's step "Substitute placeholder versions in
# manifests" runs `sed -i s|0.0.0-dev|$VERSION|g` over this
# connector/manifest.toml, where $VERSION is derived from the pushed
# `vX.Y.Z` tag. That step hard-fails (exit 1) if any `0.0.0-dev`
# placeholder survives the sed, so an unsubstituted version can never
# ship. The downstream sign-and-publish step then hashes and signs the
# already-substituted manifest. Substitution lives entirely in that
# SHA-pinned upstream action; this repo's release.yml deliberately adds
# no substitution of its own. The committed source intentionally keeps
# the placeholder so the publisher does not edit version fields by hand
# on every release. This mirrors the action manifests'
# `sha256:bound-at-release` release-template pattern.
[connector]
name = "github://ALRubinger/aileron-connector-athena"
version = "0.0.0-dev"
publisher = "ALRubinger"

# Network capability. These are the only host:port pairs this connector
# is allowed to dial. Anything else is denied at the sandbox boundary
# with class capability_denied (ADR-0005 acceptance #3).
#
# Athena is a regional service and this connector is multi-region. The
# allow-list below enumerates one athena.<region>.amazonaws.com:443 host
# per region where Athena is available in the AWS commercial (`aws`)
# partition. GovCloud (`aws-us-gov`) and China (`aws-cn`) use different
# hostnames and separate credentials, so they are out of scope here.
# This list is generated from the authoritative AWS source at
# implementation time (the global-infrastructure Athena region list,
# intersected with the `aws` partition) and emitted sorted for a stable
# diff. Region availability changes over time, so regenerate from the
# live source rather than hand-editing.
#
# Region is selected per call. The runtime reads `region` from a
# required input arg and dials athena.<region>.amazonaws.com. The host
# parses that target region from the outbound host and resolves the
# matching binding for signing. A region the allow-list does not list is
# capability_denied at the network boundary.
[capabilities.network]
hosts = [
  "athena.af-south-1.amazonaws.com:443",
  "athena.ap-east-1.amazonaws.com:443",
  "athena.ap-east-2.amazonaws.com:443",
  "athena.ap-northeast-1.amazonaws.com:443",
  "athena.ap-northeast-2.amazonaws.com:443",
  "athena.ap-northeast-3.amazonaws.com:443",
  "athena.ap-south-1.amazonaws.com:443",
  "athena.ap-south-2.amazonaws.com:443",
  "athena.ap-southeast-1.amazonaws.com:443",
  "athena.ap-southeast-2.amazonaws.com:443",
  "athena.ap-southeast-3.amazonaws.com:443",
  "athena.ap-southeast-4.amazonaws.com:443",
  "athena.ap-southeast-5.amazonaws.com:443",
  "athena.ap-southeast-6.amazonaws.com:443",
  "athena.ap-southeast-7.amazonaws.com:443",
  "athena.ca-central-1.amazonaws.com:443",
  "athena.ca-west-1.amazonaws.com:443",
  "athena.eu-central-1.amazonaws.com:443",
  "athena.eu-central-2.amazonaws.com:443",
  "athena.eu-north-1.amazonaws.com:443",
  "athena.eu-south-1.amazonaws.com:443",
  "athena.eu-south-2.amazonaws.com:443",
  "athena.eu-west-1.amazonaws.com:443",
  "athena.eu-west-2.amazonaws.com:443",
  "athena.eu-west-3.amazonaws.com:443",
  "athena.il-central-1.amazonaws.com:443",
  "athena.me-central-1.amazonaws.com:443",
  "athena.me-south-1.amazonaws.com:443",
  "athena.mx-central-1.amazonaws.com:443",
  "athena.sa-east-1.amazonaws.com:443",
  "athena.us-east-1.amazonaws.com:443",
  "athena.us-east-2.amazonaws.com:443",
  "athena.us-west-1.amazonaws.com:443",
  "athena.us-west-2.amazonaws.com:443",
]

# Credential capability. This is the kind of credential the runtime
# resolves and injects on the connector's behalf. Per ADR-0005 the
# connector never holds the credential bytes. The runtime signs the
# outbound request host-side (Authorization / X-Amz-Date /
# X-Amz-Content-Sha256) when an outbound request marks itself as
# `credential: "aws_sigv4"`.
#
# `kind` MUST exactly equal the `credential = "aws_sigv4"` marker that
# outbound http_request sets. A mismatch is rejected with
# capability_denied.
#
# Unlike the OAuth sibling connectors, aws_sigv4 needs NO release-time
# secret substitution. The OAuth connectors carry a
# `client_secret = "bound-at-release"` placeholder that the release
# workflow fills from a repository secret. This connector deliberately
# does not use that pattern. The AWS secret access key is vault-only.
# It is injected host-side at the network boundary and is never present
# in source, in this manifest, or in the connector binary.
#
# `region` and `access_key_id` come from the binding, not the manifest.
# An operator sets them per binding with
# `aileron binding setup --region <r> --access-key-id <id>`. The host
# selects the binding by the request's target region (parsed from the
# outbound athena.<region>.amazonaws.com host) and signs with that
# binding's region and access key id. One install can hold several
# region-scoped bindings, so this connector is multi-region. The
# non-secret `access_key_id` (the public half of the key pair) lives on
# the binding alongside the region; the secret access key stays
# vault-only.
#
# `service` is the only credential field the manifest fixes, and it MUST
# equal "athena". The binding supplies the rest.
#
# Static long-lived keys only. No session or temporary credentials
# (no `X-Amz-Security-Token`), deferred per ADR-0019.
#
# Field values contain no CR or LF; host-side manifest validation
# rejects either.
[capabilities.credential]
kind = "aws_sigv4"
scope = "Run and inspect Athena queries, fetch query results, and browse Glue Data Catalog databases, tables, and columns; read-only"
service = "athena"
